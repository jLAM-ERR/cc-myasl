[package]
name = "claude-statusline"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "claude-statusline"
path = "src/main.rs"

[dependencies]
ureq = { version = "2", features = ["rustls"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
directories = "5"
anyhow = "1"

[dev-dependencies]
mockito = "1"
tempfile = "3"
assert_cmd = "2"
predicates = "3"

[profile.release]
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"
