name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Strip the leading "v" so the archive name matches install.sh's
      # tarball pattern: claude-statusline-${VER_NUM}-${TARGET}.tar.gz
      # (install.sh does VER_NUM="${VERSION#v}" before constructing the URL).
      - name: Compute version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build, package, and upload
        if: github.event_name == 'push'
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: claude-statusline
          target: ${{ matrix.target }}
          archive: claude-statusline-${{ steps.version.outputs.version }}-$target
          include: templates,README.md
          tar: unix
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

      # Dry-run on PRs touching this workflow: verify the build compiles
      # without uploading anything.
      - name: Dry-run build (PR only)
        if: github.event_name == 'pull_request'
        run: cargo build --release --target ${{ matrix.target }} --locked
