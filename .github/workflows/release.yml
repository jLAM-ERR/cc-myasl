name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"

permissions:
  contents: write   # required to create the GitHub Release + upload assets

jobs:
  # Create the GitHub Release once, before any matrix job tries to upload to it.
  # taiki-e/upload-rust-binary-action@v1 expects the release to exist; it does
  # NOT auto-create one. Without this step the matrix jobs retry "release not
  # found" until they time out. Single source of release metadata.
  create-release:
    name: Create GitHub Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release if it doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping create."
          else
            gh release create "$TAG" --title "$TAG" \
              --notes "Automated release $TAG. See CHANGELOG.md for details."
          fi

  release:
    name: Build ${{ matrix.target }}
    needs: [create-release]
    # `always()` lets this job still run on PR events where create-release is
    # skipped (its `if: github.event_name == 'push'` filter). We require either
    # a successful create-release (tag push) or a skipped one (PR dry-run).
    if: |
      always() &&
      (needs.create-release.result == 'success' ||
       needs.create-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Strip the leading "v" so the archive name matches install.sh's
      # tarball pattern: cc-myasl-${VER_NUM}-${TARGET}.tar.gz
      # (install.sh does VER_NUM="${VERSION#v}" before constructing the URL).
      - name: Compute version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build, package, and upload
        if: github.event_name == 'push'
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: cc-myasl
          target: ${{ matrix.target }}
          # `$target` here is the action's own placeholder (NOT a shell
          # variable, NOT a `${{ matrix.target }}` expression). The action
          # substitutes it to the matrix target at upload time. The leading
          # `${{ steps.version.outputs.version }}` is GitHub Actions
          # expression syntax, evaluated by the runner. End result:
          #   cc-myasl-0.1.0-aarch64-apple-darwin.tar.gz
          # which exactly matches install.sh's tarball pattern.
          archive: cc-myasl-${{ steps.version.outputs.version }}-$target
          include: templates,README.md
          tar: unix
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

      # Dry-run on PRs touching this workflow: verify the build compiles
      # without uploading anything.
      #
      # We restrict the dry-run to natively-buildable targets (the macOS
      # runners have everything they need; ubuntu-latest does NOT have a
      # musl C linker installed by default, and the production job lets
      # `taiki-e/upload-rust-binary-action` install `cross` internally —
      # we can't easily reproduce that here). Skipping musl targets in
      # the dry-run is acceptable: a workflow-syntax bug will still trip
      # the macOS legs.
      - name: Dry-run build (PR only)
        if: github.event_name == 'pull_request' && !endsWith(matrix.target, '-linux-musl')
        run: cargo build --release --target ${{ matrix.target }} --locked
