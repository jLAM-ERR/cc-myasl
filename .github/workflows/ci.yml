name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# `billyjbryant/create-status-check@v2` (the final step in each matrix leg)
# writes to the commit-status API. The default GITHUB_TOKEN does not have
# this permission unless granted explicitly.
permissions:
  contents: read
  statuses: write

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: Check LOC limit
        run: bash scripts/check-loc.sh

      - name: Check invariants
        run: bash scripts/check-invariants.sh

      # shellcheck only on Linux: ubuntu-latest has it pre-installed, while
      # macos-latest does not. The check is OS-independent (POSIX sh syntax),
      # so the ubuntu leg is sufficient coverage.
      - name: Shellcheck
        if: runner.os == 'Linux'
        run: shellcheck scripts/*.sh

      # Surface the per-matrix-leg result as a GitHub commit-status check.
      # `if: always()` so a failure earlier in the job still reports.
      # Maps job.status (success | failure | cancelled) onto the action's
      # `state` enum (success | failure | error | pending).
      - name: create-status-check
        if: always()
        uses: billyjbryant/create-status-check@v2
        with:
          authToken: ${{ secrets.GITHUB_TOKEN }}
          state: ${{ job.status == 'success' && 'success' || (job.status == 'cancelled' && 'error' || 'failure') }}
          context: CI (${{ matrix.os }})
          description: fmt + clippy + test + check-loc + check-invariants${{ runner.os == 'Linux' && ' + shellcheck' || '' }}
