name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: Check LOC limit
        run: bash scripts/check-loc.sh

      - name: Check invariants
        run: bash scripts/check-invariants.sh

      # shellcheck only on Linux: ubuntu-latest has it pre-installed, while
      # macos-latest does not. The check is OS-independent (POSIX sh syntax),
      # so the ubuntu leg is sufficient coverage.
      - name: Shellcheck
        if: runner.os == 'Linux'
        run: shellcheck scripts/*.sh
